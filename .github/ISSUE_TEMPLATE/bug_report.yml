name: Bug Report
description: Create a report to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I try to...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide details about your environment:
      placeholder: |
        - Node.js version: [e.g. 22.5.1]
        - OpenClaw version: [e.g. 2026.5.1]
        - OS: [e.g. Ubuntu 22.04, macOS 14, Android/Termux]
        - Plugin version: [e.g. 2026.5.1]
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: If applicable, add logs to help explain your problem.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have checked the [Known Issues](https://github.com/niyazmft/openclaw-zulip-bridge#known-issues) section
          required: true
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I am using a [supported version](https://github.com/niyazmft/openclaw-zulip-bridge/blob/main/SECURITY.md#supported-versions)
          required: true
